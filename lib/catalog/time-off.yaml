# lib/catalog/time-off.yaml
dataset: time_off
display_name: "Time Off / PTO"
description: "Weekly PTO days per employee (from V_PTO_WEEKLY view — handles date range expansion)"
base_table: V_PTO_WEEKLY
joins:
  - table: TL_EMPLOYEES
    alias: e
    on: "LOWER(e.EMAIL) = {base}.EMAIL"
    type: left

measures:
  - name: pto_days
    sql: "SUM({base}.PTO_DAYS)"
    type: number
    description: "Total PTO days taken"
  - name: employee_count
    sql: "COUNT(DISTINCT {base}.EMAIL)"
    type: number
    description: "Number of employees with PTO"

dimensions:
  - name: employee_email
    sql: "{base}.EMAIL"
    type: string
    description: "Employee email"
  - name: employee_name
    sql: "e.DISPLAY_NAME"
    type: string
    description: "Employee name"
  - name: department
    sql: "e.DEPARTMENT"
    type: string
    description: "Department"
  - name: week
    sql: "{base}.WEEK_START"
    type: time
    description: "Week start date"

scoping:
  manager:
    sql: "e.DEPARTMENT = :scope_dept"
    requires_join: true
  employee:
    deny: true
