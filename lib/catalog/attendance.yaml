# lib/catalog/attendance.yaml
dataset: attendance
display_name: "Office Attendance"
description: "Weekly office vs remote attendance by employee and department (from V_ATTENDANCE_WEEKLY view)"
base_table: V_ATTENDANCE_WEEKLY

measures:
  - name: office_days
    sql: "SUM({base}.OFFICE_DAYS)"
    type: number
    description: "Total office days"
  - name: remote_days
    sql: "SUM({base}.REMOTE_DAYS)"
    type: number
    description: "Total remote days"
  - name: total_days
    sql: "SUM({base}.OFFICE_DAYS + {base}.REMOTE_DAYS)"
    type: number
    description: "Total working days (office + remote)"
  - name: office_pct
    sql: "ROUND(SUM({base}.OFFICE_DAYS) * 100.0 / NULLIF(SUM({base}.OFFICE_DAYS + {base}.REMOTE_DAYS), 0), 1)"
    type: number
    description: "Percentage of days in office"
  - name: employee_count
    sql: "COUNT(DISTINCT {base}.EMAIL)"
    type: number
    description: "Number of employees"

dimensions:
  - name: department
    sql: "{base}.DEPARTMENT"
    type: string
    description: "Employee department"
  - name: employee_name
    sql: "{base}.DISPLAY_NAME"
    type: string
    description: "Employee name"
  - name: office_location
    sql: "{base}.OFFICE_LOCATION"
    type: string
    description: "Assigned office location"
  - name: week
    sql: "{base}.WEEK_START"
    type: time
    description: "Week start date (Monday)"

scoping:
  manager:
    sql: "{base}.DEPARTMENT = :scope_dept"
  employee:
    deny: true
