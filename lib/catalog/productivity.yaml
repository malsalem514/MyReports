# lib/catalog/productivity.yaml
dataset: productivity
display_name: "Employee Productivity"
description: "Daily productivity metrics from ActivTrak — active time, focus time, collaboration, breaks, utilization"
base_table: AT_DAILY_USER_SUMMARY
joins:
  - table: TL_EMPLOYEES
    alias: e
    on: "LOWER(e.EMAIL) = (SELECT LOWER(uc.USER_NAME) FROM AT_USERS_CACHE uc WHERE uc.USER_ID = {base}.USER_ID)"
    type: left

measures:
  - name: productive_hours
    sql: "ROUND(SUM({base}.PRODUCTIVE_ACTIVE_DURATION_SECONDS) / 3600, 1)"
    type: number
    description: "Total productive active hours"
  - name: total_hours
    sql: "ROUND(SUM({base}.TOTAL_DURATION_SECONDS) / 3600, 1)"
    type: number
    description: "Total tracked hours"
  - name: focus_hours
    sql: "ROUND(SUM({base}.FOCUSED_DURATION_SECONDS) / 3600, 1)"
    type: number
    description: "Total deep focus hours"
  - name: avg_productivity_pct
    sql: "ROUND(AVG(CASE WHEN {base}.TOTAL_DURATION_SECONDS > 0 THEN {base}.PRODUCTIVE_ACTIVE_DURATION_SECONDS * 100.0 / {base}.TOTAL_DURATION_SECONDS END), 1)"
    type: number
    description: "Average productivity percentage"
  - name: employee_count
    sql: "COUNT(DISTINCT {base}.USER_ID)"
    type: number
    description: "Number of unique employees"
  - name: avg_break_count
    sql: "ROUND(AVG({base}.BREAK_COUNT), 1)"
    type: number
    description: "Average breaks per day"
  - name: collaboration_hours
    sql: "ROUND(SUM({base}.COLLABORATION_DURATION_SECONDS) / 3600, 1)"
    type: number
    description: "Total collaboration hours"

dimensions:
  - name: department
    sql: "e.DEPARTMENT"
    type: string
    description: "Employee department"
  - name: employee_name
    sql: "e.DISPLAY_NAME"
    type: string
    description: "Employee display name"
  - name: location
    sql: "{base}.LOCATION"
    type: string
    description: "Work location"
    values: ["Office", "Remote", "Office/Remote"]
  - name: utilization_level
    sql: "{base}.UTILIZATION_LEVEL"
    type: string
    description: "Utilization classification"
    values: ["Healthy", "Overutilized", "Underutilized"]
  - name: day_of_week
    sql: "{base}.DAY_OF_WEEK"
    type: string
    description: "Day of week"
    values: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"]
  - name: date
    sql: "{base}.LOCAL_DATE"
    type: time
    description: "Activity date"
  - name: week
    sql: "{base}.ACTIVITY_WEEK"
    type: time
    description: "Activity week (Monday start)"

scoping:
  manager:
    sql: "e.DEPARTMENT = :scope_dept"
    requires_join: true
  employee:
    deny: true
