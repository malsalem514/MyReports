# lib/catalog/work-location.yaml
dataset: work_location
display_name: "Work Location"
description: "Daily office vs remote work patterns with IP and computer tracking"
base_table: DAILY_WORK_LOCATION
joins:
  - table: AT_USERS_CACHE
    alias: uc
    on: "uc.USER_ID = {base}.USER_ID"
    type: left
  - table: TL_EMPLOYEES
    alias: e
    on: "LOWER(e.EMAIL) = LOWER(uc.USER_NAME)"
    type: left

measures:
  - name: days_count
    sql: "COUNT(*)"
    type: number
    description: "Number of days"
  - name: office_days
    sql: "SUM(CASE WHEN {base}.LOCATION = 'Office' THEN 1 ELSE 0 END)"
    type: number
    description: "Days in office"
  - name: remote_days
    sql: "SUM(CASE WHEN {base}.LOCATION = 'Remote' THEN 1 ELSE 0 END)"
    type: number
    description: "Days remote"
  - name: employee_count
    sql: "COUNT(DISTINCT {base}.USER_ID)"
    type: number
    description: "Unique employees"

dimensions:
  - name: employee_name
    sql: "{base}.USER_NAME"
    type: string
    description: "Employee username/email"
  - name: location
    sql: "{base}.LOCATION"
    type: string
    description: "Work location"
    values: ["Office", "Remote"]
  - name: department
    sql: "e.DEPARTMENT"
    type: string
    description: "Department"
  - name: computer_name
    sql: "{base}.COMPUTER_NAME"
    type: string
    description: "Computer/device name"
  - name: day_of_week
    sql: "{base}.DAY_OF_WEEK"
    type: string
    description: "Day of week"
  - name: date
    sql: "{base}.LOCAL_DATE"
    type: time
    description: "Date"
  - name: week
    sql: "{base}.ACTIVITY_WEEK"
    type: time
    description: "Week start"

scoping:
  manager:
    sql: "e.DEPARTMENT = :scope_dept"
    requires_join: true
  employee:
    deny: true
